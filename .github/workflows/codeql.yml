name: codeql

# Code scanning (CodeQL) requires either a public repo OR GitHub Advanced
# Security on a private repo. Until one of those is true, this workflow
# fails to upload SARIF results. Triggers are gated on `manual run only` so
# CI doesn't go red on every push.
#
# To re-enable on every push/PR: replace the `on:` block below with the
# original triggers from git history (push to main, pull_request to main,
# weekly schedule).
on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
